<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Chat bubble body (green) -->
  <ellipse cx="16" cy="16" rx="12" ry="11" fill="#4CAF50"/>
  <!-- Chat bubble tail -->
  <path d="M8 24 Q6 28 4 29 Q8 27 12 25" fill="#4CAF50"/>
  <!-- Graduation cap top -->
  <polygon points="4,8 16,3 28,8 16,11" fill="#333"/>
  <!-- Cap band -->
  <rect x="10" y="9" width="12" height="2" rx="0.5" fill="#333"/>
  <!-- Tassel -->
  <line x1="26" y1="8" x2="28" y2="13" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="28" cy="13.5" r="1" fill="#333"/>
  <!-- Left glasses frame -->
  <circle cx="12" cy="15" r="4" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Right glasses frame -->
  <circle cx="20" cy="15" r="4" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Glasses bridge -->
  <path d="M16 15 Q16 13.5 16 15" stroke="#333" stroke-width="1.5" fill="none"/>
  <line x1="15.5" y1="14" x2="16.5" y2="14" stroke="#333" stroke-width="1.5"/>
  <!-- Left eye white -->
  <circle cx="12" cy="15" r="3" fill="white"/>
  <!-- Right eye white -->
  <circle cx="20" cy="15" r="3" fill="white"/>
  <!-- Left pupil -->
  <circle cx="12.5" cy="14.5" r="1.8" fill="#111"/>
  <circle cx="13" cy="14" r="0.6" fill="white"/>
  <!-- Right pupil -->
  <circle cx="20.5" cy="14.5" r="1.8" fill="#111"/>
  <circle cx="21" cy="14" r="0.6" fill="white"/>
  <!-- Mouth (happy) -->
  <path d="M13 20 Q16 23 19 20" stroke="#333" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
