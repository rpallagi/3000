<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Body (green) -->
  <ellipse cx="16" cy="20" rx="10" ry="10" fill="#4CAF50"/>
  <!-- Belly -->
  <ellipse cx="16" cy="22" rx="6" ry="6" fill="#81C784"/>
  <!-- Left eye white -->
  <circle cx="12" cy="16" r="4.5" fill="white"/>
  <!-- Right eye white -->
  <circle cx="20" cy="16" r="4.5" fill="white"/>
  <!-- Left pupil -->
  <circle cx="12" cy="16" r="2.5" fill="#333"/>
  <!-- Right pupil -->
  <circle cx="20" cy="16" r="2.5" fill="#333"/>
  <!-- Beak -->
  <polygon points="16,19 14,21 18,21" fill="#FF9800"/>
  <!-- Graduation cap -->
  <polygon points="6,10 16,5 26,10 16,13" fill="#333"/>
  <rect x="14.5" y="10" width="3" height="4" fill="#333"/>
  <!-- Tassel -->
  <line x1="24" y1="10" x2="26" y2="14" stroke="#C2185B" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="26" cy="14.5" r="1.2" fill="#C2185B"/>
</svg>
